{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>User Dashboard | AES</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 280px;
            --primary-color: #0866FF;
            --bg-color: #F0F2F5;
            --card-shadow: 0 2px 4px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: white;
            position: fixed;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid #f0f0f0;
        }

        .sidebar-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-menu {
            padding: 20px 12px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #1C1E21;
            text-decoration: none;
            font-weight: 500;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: #F2F2F2;
        }

        .nav-link.active {
            background-color: #E7F3FF;
            color: var(--primary-color);
        }

        .nav-link i {
            font-size: 1.2rem;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #f0f0f0;
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-navbar {
            height: 70px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .content-area {
            padding: 30px;
            flex: 1;
        }

        /* Dashboard Styles */
        .dashboard-header {
            margin-bottom: 30px;
        }

        .welcome-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #1C1E21;
        }

        .modern-card {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 24px;
            border: none;
        }

        .btn-action {
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            border: none;
            transition: 0.2s;
        }

        .btn-action:hover {
            background: #0055D3;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="{% url 'UserHome' %}" class="sidebar-brand">
                <i class="bi bi-pencil-square"></i>
                <span>AES Score</span>
            </a>
        </div>
        
        <div class="nav-menu">
            <a href="{% url 'UserHome' %}" class="nav-link {% if request.resolver_match.url_name == 'UserHome' %}active{% endif %}">
                <i class="bi bi-house-door"></i>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'prediction' %}" class="nav-link {% if request.resolver_match.url_name == 'prediction' %}active{% endif %}">
                <i class="bi bi-magic"></i>
                <span>Analyze Essay</span>
            </a>
            <a href="{% url 'DatasetView' %}" class="nav-link {% if request.resolver_match.url_name == 'DatasetView' %}active{% endif %}">
                <i class="bi bi-database"></i>
                <span>Training Data</span>
            </a>
            <a href="{% url 'training' %}" class="nav-link {% if request.resolver_match.url_name == 'training' %}active{% endif %}">
                <i class="bi bi-cpu"></i>
                <span>Model Stats</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <a href="{% url 'index' %}" class="nav-link text-danger">
                <i class="bi bi-box-arrow-left"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <nav class="top-navbar">
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted fw-medium">User Panel</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end">
                    <div class="fw-bold">{{ request.session.loggeduser }}</div>
                    <div class="text-muted small">Student Account</div>
                </div>
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; font-weight: 700;">
                    {{ request.session.loggeduser|slice:":1"|upper }}
                </div>
            </div>
        </nav>

        <div class="content-area">
            {% block contents %}
            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}
    {% endblock %}
</body>
</html>
